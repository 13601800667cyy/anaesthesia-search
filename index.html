            // Filter by category
            if (currentCategory !== 'all') {
                results = results.filter(item => item.category === currentCategory);
            }

            currentResults = results;
            currentPage = 1; // Reset to first page on new search
            renderResults(results);
        }

        // Pagination
        const PAGE_SIZE = 20;
        let currentPage = 1;

        function renderResults(results) {
            const newsList = document.getElementById('newsList');
            const resultCount = document.getElementById('resultCount');

            resultCount.textContent = results.length;

            if (results.length === 0) {
                newsList.innerHTML = `
                    <div class="empty">
                        <div class="empty-icon">🔍</div>
                        <div class="empty-text">未找到相关资讯</div>
                    </div>
                `;
                return;
            }

            // Calculate pagination
            const startIndex = (currentPage - 1) * PAGE_SIZE;
            const endIndex = startIndex + PAGE_SIZE;
            const pageResults = results.slice(startIndex, endIndex);

            newsList.innerHTML = pageResults.map((item, index) => `
                <div class="news-item" style="animation-delay: ${Math.min(index * 0.03, 0.5)}s" onclick="showNewsDetail('${item.id}')">
                    <div class="news-category category-${item.category}">${item.category}</div>
                    <div class="news-title">${item.title}</div>
                    <div class="news-summary">${item.summary}</div>
                    <div class="news-meta">
                        <span class="news-source">${item.source}</span>
                        <span class="news-date">${item.date}</span>
                    </div>
                </div>
            `).join('');

            // Add pagination
            const totalPages = Math.ceil(results.length / PAGE_SIZE);
            if (totalPages > 1) {
                let paginationHtml = '<div class="pagination">';
                paginationHtml += `<span class="page-info">${currentPage}/${totalPages}</span>`;
                if (currentPage > 1) {
                    paginationHtml += `<button class="page-btn" onclick="changePage(-1)">上一页</button>`;
                }
                if (currentPage < totalPages) {
                    paginationHtml += `<button class="page-btn" onclick="changePage(1)">下一页</button>`;
                }
                paginationHtml += '</div>';
                newsList.innerHTML += paginationHtml;
            }
        }

        // Change page function
        function changePage(delta) {
            const totalPages = Math.ceil(currentResults.length / PAGE_SIZE);
            currentPage += delta;
            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;
            renderResults(currentResults);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Category tab click
        document.getElementById('categoryTabs').addEventListener('click', function(e) {
            if (e.target.classList.contains('tab')) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.dataset.category;
                doSearch();
            }
        });

        // Enter key to search
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                doSearch();
            }
        });

        // Initialize on load
        init();
    </script>
</body>
</html>
