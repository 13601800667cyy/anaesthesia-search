<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻醉镇痛与围术期脑健康产业资讯</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; color: #fff; padding-bottom: 80px; }
        .container { max-width: 480px; margin: 0 auto; padding: 0 16px; }
        .header { padding: 24px 0 20px; position: sticky; top: 0; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); z-index: 100; }
        .header h1 { font-size: 17px; font-weight: 700; margin-bottom: 2px; }
        .search-box { background: rgba(255,255,255,0.1); border-radius: 14px; padding: 4px; display: flex; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.1); }
        .search-box input { flex: 1; background: transparent; border: none; outline: none; padding: 14px 16px; font-size: 15px; color: #fff; }
        .search-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; border-radius: 10px; padding: 12px 18px; font-size: 14px; color: white; cursor: pointer; }
        .category-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 12px; }
        .tab { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 8px 16px; font-size: 13px; color: rgba(255,255,255,0.7); white-space: nowrap; cursor: pointer; }
        .tab.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .result-info { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 12px; }
        .news-item { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .news-category { display: inline-block; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 4px; margin-bottom: 8px; }
        .category-通用行业资讯 { background: rgba(102,126,234,0.3); color: #a5b4fc; }
        .category-政策标准 { background: rgba(240,147,251,0.3); color: #f093fb; }
        .category-临床进展 { background: rgba(79,172,254,0.3); color: #4facfe; }
        .category-器械新药 { background: rgba(67,233,123,0.3); color: #43e97b; }
        .category-产业市场 { background: rgba(250,112,154,0.3); color: #fa709a; }
        .category-成果转化 { background: rgba(252,203,144,0.3); color: #fccb90; }
        .category-学术会议 { background: rgba(168,237,234,0.3); color: #a8edea; }
        .category-教育培训 { background: rgba(255,154,158,0.3); color: #ff9a9e; }
        .news-title { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 8px; }
        .news-summary { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.5; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .news-meta { font-size: 11px; color: rgba(255,255,255,0.4); display: flex; justify-content: space-between; }
        .pagination { display: flex; justify-content: center; gap: 15px; padding: 20px; }
        .page-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; border-radius: 8px; padding: 10px 20px; font-size: 13px; color: white; cursor: pointer; }
        .empty { text-align: center; padding: 40px; color: rgba(255,255,255,0.5); }
        .loading { text-align: center; padding: 40px; color: rgba(255,255,255,0.5); }
        .detail-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .detail-popup { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-radius: 16px; padding: 24px; max-width: 400px; width: 100%; max-height: 80vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
        .detail-title { font-size: 18px; font-weight: 700; margin: 12px 0; }
        .detail-summary { font-size: 14px; line-height: 1.6; margin-bottom: 16px; white-space: pre-wrap; }
        .detail-link { display: block; text-align: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 14px; border-radius: 10px; text-decoration: none; font-weight: 600; }
        .detail-link.disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); cursor: not-allowed; }
        .footer { text-align: center; padding: 30px 0 20px; color: rgba(255,255,255,0.4); font-size: 11px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔬 麻醉镇痛与围术期脑健康产业资讯</h1>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索资讯...">
            <button class="search-btn" onclick="doSearch()">搜索</button>
        </div>
        <div class="category-tabs" id="categoryTabs">
            <div class="tab active" data-category="all">全部</div>
            <div class="tab" data-category="通用行业资讯">行业资讯</div>
            <div class="tab" data-category="政策标准">政策标准</div>
            <div class="tab" data-category="临床进展">临床进展</div>
            <div class="tab" data-category="器械新药">器械新药</div>
            <div class="tab" data-category="产业市场">产业市场</div>
            <div class="tab" data-category="成果转化">成果转化</div>
            <div class="tab" data-category="学术会议">学术会议</div>
            <div class="tab" data-category="教育培训">教育培训</div>
        </div>
        <div class="result-info" id="resultCount">加载中...</div>
        <div id="newsList"></div>
        <div class="footer">徐州百瑞麻醉科技研究院</div>
    </div>
    <script>
        const DATA_URL = 'https://raw.githubusercontent.com/13601800667cyy/anaesthesia-search/main/data/news.json';
        let allNews = [];
        let filteredNews = [];
        let currentCategory = 'all';
        let currentPage = 1;
        const PAGE_SIZE = 20;

        // 加载数据
        function loadData() {
            document.getElementById('newsList').innerHTML = '<div class="loading">正在加载...</div>';
            fetch(DATA_URL + '?t=' + Date.now())
                .then(res => res.json())
                .then(data => {
                    allNews = data.news || [];
                    filteredNews = allNews;
                    currentPage = 1;
                    renderResults();
                })
                .catch(err => {
                    document.getElementById('newsList').innerHTML = '<div class="empty">数据加载失败，请刷新</div>';
                });
        }

        function doSearch() {
            const kw = document.getElementById('searchInput').value.trim();
            filteredNews = kw 
                ? allNews.filter(i => i.title.includes(kw) || (i.summary||'').includes(kw))
                : allNews;
            if (currentCategory !== 'all') {
                filteredNews = filteredNews.filter(i => i.category === currentCategory);
            }
            currentPage = 1;
            renderResults();
        }

        function renderResults() {
            const list = document.getElementById('newsList');
            document.getElementById('resultCount').textContent = '共 ' + filteredNews.length + ' 条资讯';
            
            if (!filteredNews.length) {
                list.innerHTML = '<div class="empty">未找到相关资讯</div>';
                return;
            }
            
            const start = (currentPage - 1) * PAGE_SIZE;
            const page = filteredNews.slice(start, start + PAGE_SIZE);
            
            list.innerHTML = page.map(i => `
                <div class="news-item" onclick="showDetail('${i.id}')">
                    <div class="news-category category-${i.category}">${i.category}</div>
                    <div class="news-title">${i.title}</div>
                    <div class="news-summary">${(i.summary||'').substring(0,100)}</div>
                    <div class="news-meta"><span>${i.source}</span><span>${i.date}</span></div>
                </div>
            `).join('');
            
            const total = Math.ceil(filteredNews.length / PAGE_SIZE);
            if (total > 1) {
                let p = '<div class="pagination">';
                if (currentPage > 1) p += '<button class="page-btn" onclick="changePage(-1)">上一页</button>';
                p += '<span style="color:rgba(255,255,255,0.5)">' + currentPage + '/' + total + '</span>';
                if (currentPage < total) p += '<button class="page-btn" onclick="changePage(1)">下一页</button>';
                p += '</div>';
                list.innerHTML += p;
            }
        }

        function changePage(d) {
            const total = Math.ceil(filteredNews.length / PAGE_SIZE);
            currentPage = Math.max(1, Math.min(total, currentPage + d));
            renderResults();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showDetail(id) {
            const item = allNews.find(n => n.id === id);
            if (!item) return;
            const html = '<div class="detail-overlay" onclick="this.remove()"><div class="detail-popup" onclick="event.stopPropagation()">' +
                '<div class="news-category category-' + item.category + '">' + item.category + '</div>' +
                '<div class="detail-title">' + item.title + '</div>' +
                '<div class="news-meta" style="margin-bottom:12px"><span>' + item.source + '</span><span>' + item.date + '</span></div>' +
                '<div class="detail-summary">' + (item.summary||'') + '</div>' +
                (item.url && item.url.startsWith('http') 
                    ? '<a href="' + item.url + '" class="detail-link" target="_blank">查看原文 →</a>' 
                    : '<div class="detail-link disabled">暂无原文链接</div>') +
                '</div></div>';
            document.body.insertAdjacentHTML('beforeend', html);
        }

        document.getElementById('categoryTabs').onclick = e => {
            if (e.target.classList.contains('tab')) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.dataset.category;
                doSearch();
            }
        };

        document.getElementById('searchInput').onkeypress = e => { if (e.key === 'Enter') doSearch(); };

        loadData();
    </script>
</body>
</html>
