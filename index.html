        function fuzzySearch(text, keyword) {
            if (!keyword) return true;
            text = text.toLowerCase();
            keyword = keyword.toLowerCase();

            // Direct match
            if (text.includes(keyword)) return true;

            // Fuzzy match - check if all characters appear in order
            let keywordIndex = 0;
            for (let i = 0; i < text.length && keywordIndex < keyword.length; i++) {
                if (text[i] === keyword[keywordIndex]) {
                    keywordIndex++;
                }
            }
            return keywordIndex === keyword.length;
        }

        // Initialize
        function init() {
            allNews = newsData.news;

            // Sort by date (newest first)
            allNews.sort((a, b) => new Date(b.date) - new Date(a.date));

            renderResults(allNews);
        }

        // Search function
        // Show news detail popup
        function showNewsDetail(id) {
            const item = allNews.find(n => n.id === id);
            if (!item) return;

            const detailHtml = `
                <div class="detail-popup">
                    <div class="detail-header">
                        <span class="detail-category category-${item.category}">${item.category}</span>
                        <span class="detail-date">${item.date}</span>
                    </div>
                    <h2 class="detail-title">${item.title}</h2>
                    <div class="detail-source">来源: ${item.source}</div>
                    <div class="detail-summary">${item.summary}</div>
                    <div class="detail-tags">
                        ${(item.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                    <a href="${item.url}" target="_blank" class="detail-link">查看原文 →</a>
                </div>
            `;

            // Create popup overlay
            const overlay = document.createElement('div');
            overlay.className = 'detail-overlay';
            overlay.innerHTML = detailHtml;
            overlay.onclick = function(e) {
                if (e.target === overlay) {
                    document.body.removeChild(overlay);
                }
            };
            document.body.appendChild(overlay);
        }

        function doSearch() {
            const keyword = document.getElementById('searchInput').value.trim();
            let results;

            if (!keyword) {
                results = allNews;
            } else {
                // Search in title, summary, tags, source
                results = allNews.filter(item => {
                    return fuzzySearch(item.title, keyword) ||
                           fuzzySearch(item.summary, keyword) ||
                           fuzzySearch(item.tags.join(' '), keyword) ||
                           fuzzySearch(item.source, keyword);
                });
            }

            // Filter by category
            if (currentCategory !== 'all') {
                results = results.filter(item => item.category === currentCategory);
            }

            currentResults = results;
            renderResults(results);
        }

        // Render results
        function renderResults(results) {
            const newsList = document.getElementById('newsList');
            const resultCount = document.getElementById('resultCount');

            resultCount.textContent = results.length;

            if (results.length === 0) {
                newsList.innerHTML = `
                    <div class="empty">
                        <div class="empty-icon">🔍</div>
                        <div class="empty-text">未找到相关资讯</div>
                    </div>
                `;
                return;
            }

            newsList.innerHTML = results.map((item, index) => `
                <div class="news-item" style="animation-delay: ${Math.min(index * 0.03, 0.5)}s" onclick="showNewsDetail('${item.id}')">
                    <div class="news-category category-${item.category}">${item.category}</div>
                    <div class="news-title">${item.title}</div>
                    <div class="news-summary">${item.summary}</div>
                    <div class="news-meta">
                        <span class="news-source">${item.source}</span>
                        <span class="news-date">${item.date}</span>
                    </div>
                </div>
            `).join('');
        }

        // Category tab click
        document.getElementById('categoryTabs').addEventListener('click', function(e) {
            if (e.target.classList.contains('tab')) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.dataset.category;
                doSearch();
            }
        });

        // Enter key to search
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                doSearch();
            }
        });

        // Initialize on load
        init();
    </script>
</body>
</html>
